name: Verify & Publish

on:
  workflow_call:
    inputs:
      publish:
        description: Whether to publish packages to npm after build and test
        type: boolean
        default: false
      dist-tag:
        description: npm dist-tag to publish under (experimental, canary, latest, ...)
        type: string
        default: ''
    secrets:
      NPM_TOKEN:
        description: npm auth token used when publish is true
        required: false

jobs:
  verify-and-publish:
    name: Verify & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install

      - name: Build package
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test

